<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Blogger Control — لوحة تحكم المدونة</title>
<meta name="robots" content="noindex, nofollow">
<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="css/dark.css">
</head>
<body>

  <!-- ===================== App shell ===================== -->
  <div id="app-shell">

    <aside class="sidebar glass">
      <div class="brand">
        <span class="orb warn" id="conn-orb" title="جارِ الاتصال..."></span>
        Blogger Control
      </div>

      <nav class="nav-group">
        <span class="nav-label">عام</span>
        <div class="nav-item active" data-view="dashboard">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="9" rx="2"/><rect x="14" y="3" width="7" height="5" rx="2"/><rect x="14" y="12" width="7" height="9" rx="2"/><rect x="3" y="16" width="7" height="5" rx="2"/></svg>
          لوحة المعلومات
        </div>
        <div class="nav-item" data-view="posts">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16v16H4z"/><path d="M8 9h8M8 13h8M8 17h4"/></svg>
          المقالات
        </div>
        <div class="nav-item" data-view="newpost">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14"/></svg>
          مقال جديد
        </div>
      </nav>

      <nav class="nav-group">
        <span class="nav-label">الإدارة</span>
        <div class="nav-item" data-view="projects">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 7l3-4h12l3 4M3 7v13h18V7M3 7h18"/></svg>
          المشاريع
        </div>
        <div class="nav-item" data-view="settings">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.7 1.7 0 00.34 1.87l.06.06a2 2 0 11-2.83 2.83l-.06-.06a1.7 1.7 0 00-1.87-.34 1.7 1.7 0 00-1 1.55V21a2 2 0 01-4 0v-.09a1.7 1.7 0 00-1-1.55 1.7 1.7 0 00-1.87.34l-.06.06a2 2 0 11-2.83-2.83l.06-.06a1.7 1.7 0 00.34-1.87 1.7 1.7 0 00-1.55-1H3a2 2 0 010-4h.09a1.7 1.7 0 001.55-1 1.7 1.7 0 00-.34-1.87l-.06-.06a2 2 0 112.83-2.83l.06.06a1.7 1.7 0 001.87.34H9a1.7 1.7 0 001-1.55V3a2 2 0 014 0v.09a1.7 1.7 0 001 1.55 1.7 1.7 0 001.87-.34l.06-.06a2 2 0 112.83 2.83l-.06.06a1.7 1.7 0 00-.34 1.87V9a1.7 1.7 0 001.55 1H21a2 2 0 010 4h-.09a1.7 1.7 0 00-1.55 1z"/></svg>
          الإعدادات
        </div>
      </nav>

      <div class="sidebar-footer">
        <div class="project-switch glass" id="current-project" onclick="App.navigate('projects')">
          <div class="ph"></div>
          <div class="meta"><b>لا يوجد مشروع</b><span>اضغط للإدارة</span></div>
        </div>
        <button class="btn btn-ghost btn-sm" id="lock-btn" style="width:100%;">🔄 إعادة تحميل</button>
      </div>
    </aside>

    <div class="main">
      <div class="topbar glass">
        <button class="icon-btn" id="sidebar-toggle" style="display:none;">☰</button>
        <div class="search glass">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg>
          <input type="text" id="global-search" placeholder="ابحث عن مقال...">
        </div>
        <button class="icon-btn" id="theme-toggle" title="تبديل الوضع الليلي/النهاري">🌓</button>
      </div>

      <div class="content">
        <section class="view active" id="view-dashboard"></section>
        <section class="view" id="view-posts"></section>
        <section class="view" id="view-newpost"></section>
        <section class="view" id="view-projects"></section>
        <section class="view" id="view-settings"></section>
      </div>
    </div>
  </div>

  <!-- ===================== Shared overlays ===================== -->
  <div id="toast-stack"></div>

  <div id="loading-overlay">
    <div class="spinner"></div>
    <div class="loading-text">جارِ التحميل...</div>
  </div>

  <div class="modal-backdrop" id="modal-backdrop">
    <div class="modal glass"></div>
  </div>

  <!-- ===================== Modules ===================== -->
  <script src="js/ui.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/blogger.js"></script>
  <script src="js/uploader.js"></script>
  <script src="js/generator.js"></script>
  <script src="js/store.js"></script>
  <script src="js/projects.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
